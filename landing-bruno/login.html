<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar · ZapVender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #020202;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --primary: #00ffa3;
      --text-high: #ffffff;
      --text-med: #a1a1aa;
      --font-sans: 'Inter', -apple-system, sans-serif;
      --font-display: 'Outfit', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--bg-base);
      color: var(--text-med);
      font-family: var(--font-sans);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: rgba(20, 20, 20, 0.6);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
    }
    .card img { height: 44px; width: auto; margin-bottom: 24px; }
    .card h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--text-high);
      margin-bottom: 8px;
    }
    .card p { font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      color: #fff;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 100px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
      color: #fff;
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-med);
      border: 1px solid var(--border-subtle);
      margin-top: 16px;
    }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
    #redirect-msg { margin-top: 20px; font-size: 0.85rem; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <img src="./logo.png" alt="ZapVender">
    <h1>Entrar no painel</h1>
    <p id="message">Redirecionando para o painel...</p>
    <a id="btn-go" href="#" class="btn" style="display: none;">Acessar o painel</a>
    <a href="/" class="btn btn-ghost">Voltar à página inicial</a>
    <p id="redirect-msg" style="display: none;">Se não for redirecionado, use o botão acima.</p>
  </div>
  <script>
    (function() {
      var btn = document.getElementById('btn-go');
      var msg = document.getElementById('message');
      var redirectMsg = document.getElementById('redirect-msg');
      fetch('/api/config').then(function(r) { return r.json(); }).then(function(c) {
        var url = c.loginUrl || '';
        if (url && (url.indexOf('http') === 0 || url.indexOf('//') === 0)) {
          btn.href = url;
          btn.style.display = 'inline-block';
          redirectMsg.style.display = 'block';
          msg.textContent = 'Clique no botão abaixo para acessar o painel.';
          window.setTimeout(function() { window.location.href = url; }, 800);
        } else {
          msg.textContent = 'Configure a variável LOGIN_URL (ou APP_URL) no Railway com a URL do seu painel para redirecionar automaticamente.';
          btn.style.display = 'none';
        }
      }).catch(function() {
        msg.textContent = 'Não foi possível carregar a configuração. Volte à página inicial ou configure LOGIN_URL no servidor.';
      });
    })();
  </script>
</body>
</html>
